# Config local (cmd/monitor). Lambda usa configs/config.lambda.yaml.
#
# Convención: secretos como ${VAR} se resuelven con .env (cargado al startup).

discovery:
  route53:
    enabled: true
    region: us-east-1
    profile: default
    exclude_zones:
      - mailing.bodytechperu.com    # servidores de mail, no responden TLS:443
  cloudflare:
    enabled: false
    api_token: ${CLOUDFLARE_API_TOKEN}
  namecom:
    enabled: true
    username: ${NAMECOM_USERNAME}
    token: ${NAMECOM_TOKEN}
    base_url: ${NAMECOM_BASE_URL}    # https://api.dev.name.com o https://api.name.com
  static:
    enabled: true
    path: configs/static_domains.yaml

tls:
  timeout: 10s
  workers: 30
  default_port: 443

rdap:
  enrich_workers: 5
  # mismatch_tolerance_days: |RDAP - YAML fallback| permitido sin alertar.
  # 0 = estricto (1 día de diferencia ya alerta). 1 silencia el off-by-one
  # típico de zonas horarias entre el panel del registrador y el registry.
  mismatch_tolerance_days: 1
  # Cache de respuestas RDAP. Si se habilita, los runs subsiguientes evitan
  # ~80% de las llamadas HTTP. TTL recomendado 7d (las fechas de expiración
  # de dominios cambian anualmente). backend=none lo desactiva.
  cache:
    backend: file       # none | file | s3
    ttl: 168h           # 7 días
    path: state/rdap-cache.json
    # s3: { bucket: ..., key: ..., region: ... }  # cuando backend=s3

thresholds: [30, 15, 7, 3]

# Secrets local: lee .env. En Lambda usa "ssm".
secrets:
  backend: env
  dotenv_path: .env

# Por defecto local hace dryrun (escribe HTML a state/last-email.html). Para
# probar SMTP real, cambiar backend a "smtp" y completar las credenciales.
notifier:
  backend: dryrun
  dryrun:
    html_path: state/last-email.html
  smtp:
    host: ${SMTP_HOST}
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    from: ${SMTP_FROM}
    to:
      - ${SMTP_TO}
  ses:
    from: ${SES_FROM}
    to:
      - ${SES_TO}
    region: us-east-1

# Estado local: archivo JSON.
state:
  backend: file
  path: state/alerts.json

# Inventario local: archivo JSON sobrescrito en cada corrida.
inventory:
  backend: file
  path: state/inventory.json

# Deadman switch opcional (healthchecks.io / cronitor.io / endpoint propio).
# Si se completa la URL, hacemos un ping al final de cada corrida exitosa;
# el servicio remoto alerta si no recibe el ping en su ventana esperada.
healthcheck:
  url: ""             # ej. https://hc-ping.com/<uuid>
  failure_url: ""     # opcional; si vacío, se deriva agregando /fail
  timeout: 5s
